name: Проверка

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install detect-secrets

      - run: detect-secrets scan --baseline .secrets.baseline src/

  lint-and-build:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run build

  deploy:
    needs: lint-and-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "146.103.40.30 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHlOkXWQ0I8jlO3Qka7jExbWSFP+vuhQEKAnz8h/RQ8t" >> ~/.ssh/known_hosts

      - run: |
          ssh -i ~/.ssh/deploy_key root@146.103.40.30 'cd /root/projects/dimino_me && bash deploy.sh'
